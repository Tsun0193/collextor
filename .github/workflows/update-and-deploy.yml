name: Update and deploy COLLEXTOR

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Asia/Bangkok is UTC+7. These run at 06:37, 11:37, and 17:37 Bangkok time.
    - cron: "37 23 * * *"
    - cron: "37 4 * * *"
    - cron: "37 10 * * *"

concurrency:
  group: collextor-update-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Refresh feeds
        run: python -m scripts.update_feeds --smoke

      - name: Validate generated JSON
        run: python -m scripts.validate_data

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "collextor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json data/source-status.json data/archive-index.json data/current-week.json data/stocks.json data/weekly
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): refresh news feeds"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
