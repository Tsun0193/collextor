  - id: arxiv_medical_neuro
    name: arXiv - Medical AI and Neuroimaging
    enabled: true
    source_type: xml_api
    page_url: https://arxiv.org/
    category: research
    priority: medium
    max_items: 12
    research_track: medical_neuroimaging
    query: '(Alzheimer OR dementia OR "mild cognitive impairment" OR neuroimaging OR MRI OR PET OR "medical imaging") AND ("machine learning" OR "deep learning" OR multimodal OR "foundation model" OR "artificial intelligence")'
  - id: arxiv_multimodal
    name: arXiv - Multimodal and Foundation Models
    enabled: true
    source_type: xml_api
    page_url: https://arxiv.org/
    category: research
    priority: medium
    max_items: 12
    research_track: multimodal_foundation
    query: '("multimodal" OR "vision-language" OR "foundation model" OR "representation learning" OR "self-supervised" OR "3D vision" OR reasoning OR agents) AND (cat:cs.AI OR cat:cs.LG OR cat:cs.CV OR cat:cs.CL OR cat:eess.IV)'
  - id: europe_pmc
    name: Europe PMC - Medical AI and Neuroimaging
    enabled: true
    source_type: api
    page_url: https://europepmc.org/
    category: research
    priority: medium
    max_items: 12
    research_track: medical_neuroimaging
